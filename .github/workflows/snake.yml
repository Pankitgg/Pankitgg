name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate Snake SVG
        run: python scripts/generate_snake.py

      - name: List files
        run: ls -la

      - name: Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f github-contribution-grid-snake.svg ]; then
            git add github-contribution-grid-snake.svg
            git diff --cached --quiet || git commit -m "Update snake animation"
            git push
          else
            echo "Snake SVG file not generated, skipping commit"
          fi